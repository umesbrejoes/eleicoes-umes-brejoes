<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo | UMES Brejões</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div id="login">

<div class="login-box">

<img src="imagens/imagens/logo-umes.png" class="logo">

<h1>Comissão Eleitoral</h1>

<p>
Painel Administrativo da Eleição
</p>

<input
type="email"
id="email"
placeholder="E-mail">

<input
type="password"
id="senha"
placeholder="Senha">

<button onclick="entrar()">
Entrar
</button>

</div>

</div>

<div id="painel">

<header>

<img src="imagens/imagens/logo-umes.png" class="logo-header">

<div>

<h1>
PAINEL ADMINISTRATIVO
</h1>

<p>
União Municipal dos e das Estudantes de Brejões
</p>

</div>

</header>

<section class="cards">

<div class="card">

<h2>
Situação
</h2>

<span id="status">
Carregando...
</span>

</div>

<div class="card">

<h2>
Eleitores
</h2>

<span id="totalEleitores">
0
</span>

</div>

<div class="card">

<h2>
Votos
</h2>

<span id="totalVotos">
0
</span>

</div>

<div class="card">

<h2>
Chapas
</h2>

<span id="totalChapas">
0
</span>

</div>

</section>

<section class="botoes">

<button
onclick="abrirVotacao()">

🟢 Abrir votação

</button>

<button
onclick="encerrarVotacao()">

🔴 Encerrar votação

</button>

<button
onclick="gerarAtaPDF()">

📄 Ata Oficial

</button>

<button
onclick="gerarAuditoriaPDF()">

📑 Auditoria

</button>

</section>

<section class="cadastro">

<h2>

Cadastrar Chapa

</h2>

<input
type="number"
id="numero">

<input
type="text"
id="nomeChapa"
placeholder="Nome da chapa">

<input
type="text"
id="presidente"
placeholder="Presidente">

<input
type="text"
id="vice"
placeholder="Vice-Presidente">

<button
onclick="salvarChapa()">

Cadastrar

</button>

</section>

<section>

<h2>

Chapas Homologadas

</h2>

<div id="listaChapas">

</div>

</section>

<footer>

Sistema Eleitoral UMES Brejões • Comissão Eleitoral 2026

</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/admin.js"></script>

</body>

</html>
