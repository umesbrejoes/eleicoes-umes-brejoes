<section id="inscricao">

<div class="card">

<h2>Inscrição de Chapas</h2>

<p>
As inscrições de chapas estarão abertas das <strong>00h00 do dia 06 de julho de 2026</strong> até <strong>às 21h00 do dia 14 de julho de 2026</strong>, exclusivamente por meio deste Portal Oficial.
</p>

<form id="formInscricao">

<h3>Dados da Chapa</h3>

<label>Nome da Chapa *</label>
<input type="text" id="nomeChapa" required>

<label>Sigla da Chapa (opcional)</label>
<input type="text" id="sigla">

<label>Slogan (opcional)</label>
<input type="text" id="slogan">

<label>Plano de Gestão *</label>
<textarea id="plano" rows="6" required></textarea>

<hr>

<h3>Presidente</h3>

<label>Nome Completo *</label>
<input type="text" id="presidenteNome" required>

<label>CPF *</label>
<input type="text" id="presidenteCpf" required>

<label>RG *</label>
<input type="text" id="presidenteRg" required>

<label>Data de Nascimento *</label>
<input type="date" id="presidenteNascimento" required>

<label>Endereço Completo *</label>
<textarea id="presidenteEndereco" rows="3" required></textarea>

<label>CEP *</label>
<input type="text" id="presidenteCep" required>

<label>Escola *</label>
<input type="text" id="presidenteEscola" required>

<label>Série/Ano *</label>
<input type="text" id="presidenteSerie" required>

<label>Turno *</label>
<select id="presidenteTurno" required>
<option value="">Selecione</option>
<option>Matutino</option>
<option>Vespertino</option>
<option>Noturno</option>
<option>Integral</option>
</select>

<label>E-mail *</label>
<input type="email" id="presidenteEmail" required>

<label>WhatsApp *</label>
<input type="tel" id="presidenteWhatsapp" required>

<hr>

<h3>Vice-Presidente</h3>

<label>Nome Completo *</label>
<input type="text" id="viceNome" required>

<label>CPF *</label>
<input type="text" id="viceCpf" required>

<label>RG *</label>
<input type="text" id="viceRg" required>

<label>Data de Nascimento *</label>
<input type="date" id="viceNascimento" required>

<label>Endereço Completo *</label>
<textarea id="viceEndereco" rows="3" required></textarea>

<label>CEP *</label>
<input type="text" id="viceCep" required>

<label>Escola *</label>
<input type="text" id="viceEscola" required>

<label>Série/Ano *</label>
<input type="text" id="viceSerie" required>

<label>Turno *</label>
<select id="viceTurno" required>
<option value="">Selecione</option>
<option>Matutino</option>
<option>Vespertino</option>
<option>Noturno</option>
<option>Integral</option>
</select>

<label>E-mail *</label>
<input type="email" id="viceEmail" required>

<label>WhatsApp *</label>
<input type="tel" id="viceWhatsapp" required>

<hr>

<h3>Documentos Obrigatórios</h3>

<label>Documento de Identidade do Presidente *</label>
<input type="file" accept=".pdf,.jpg,.jpeg,.png" required>

<label>Documento de Identidade do Vice *</label>
<input type="file" accept=".pdf,.jpg,.jpeg,.png" required>

<label>Comprovante de Matrícula do Presidente *</label>
<input type="file" accept=".pdf,.jpg,.jpeg,.png" required>

<label>Comprovante de Matrícula do Vice *</label>
<input type="file" accept=".pdf,.jpg,.jpeg,.png" required>

<label>Declaração de Concordância *</label>
<input type="file" accept=".pdf" required>

<label>Carta-Programa da Chapa (opcional)</label>
<input type="file" accept=".pdf">

<hr>

<h3>Declarações</h3>

<label>
<input type="checkbox" required>
Declaro que todas as informações prestadas são verdadeiras.
</label>

<br><br>

<label>
<input type="checkbox" required>
Declaro que li e aceito o Edital Eleitoral, o Regimento Eleitoral e os Atos Normativos da Comissão Eleitoral.
</label>

<br><br>

<label>
<input type="checkbox" required>
Autorizo o tratamento dos meus dados pessoais exclusivamente para fins do Processo Eleitoral da UMES Brejões 2026.
</label>

<br><br>

<button type="submit">
Inscrever Chapa
</button>

</form>

</div>

</section>
